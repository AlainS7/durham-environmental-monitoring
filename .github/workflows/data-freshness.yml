name: Data Freshness Check

on:
  schedule:
    - cron: '35 8 * * *' # After daily merge + shared refresh
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write

env:
  BQ_PROJECT: ${{ vars.GCP_PROJECT_ID }}
  BQ_DATASET: sensors

jobs:
  freshness:
    runs-on: ubuntu-latest
    env:
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write GCP credentials file
        run: echo "${{ secrets.GCP_SA_KEY_JSON }}" > /tmp/gcp-key.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps minimal
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_VERIFIER_SA }}
          token_format: access_token

      - name: Run freshness check
        id: freshness
        run: |
          set +e
          EXIT=0
          : > freshness.log
          for SPEC in "sensor_readings_long:timestamp" "sensor_readings_hourly:hour_ts" "sensor_readings_daily:day_ts" "tsi_raw_materialized:ts" "wu_raw_materialized:ts"; do
            IFS=':' read -r TABLE TIME_COL <<< "$SPEC"
            echo "=== Checking ${BQ_DATASET}.${TABLE} (${TIME_COL}) ===" | tee -a freshness.log
            python scripts/check_freshness.py \
              --project "$BQ_PROJECT" \
              --dataset "$BQ_DATASET" \
              --table "$TABLE" \
              --time-column "$TIME_COL" \
              --max-lag-days 1 >> freshness.log 2>&1
            TABLE_EXIT=$?
            if [ "$TABLE_EXIT" -ne 0 ]; then
              EXIT=1
              echo "Result: FAILED (exit $TABLE_EXIT)" | tee -a freshness.log
            else
              echo "Result: OK" | tee -a freshness.log
            fi
            echo "" >> freshness.log
          done
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          cat freshness.log || true
          exit 0

      - name: Check residence freshness parity (prod vs shared)
        id: parity
        if: always()
        run: |
          set +e
          echo "=== Checking residence freshness parity (prod vs shared) ===" | tee -a freshness.log
          python scripts/check_residence_freshness_parity.py \
            --project "$BQ_PROJECT" \
            --prod-dataset sensors \
            --shared-dataset sensors_shared \
            --table residence_readings_daily \
            --max-lag-days 0 >> freshness.log 2>&1
          PARITY_EXIT=$?
          if [ "$PARITY_EXIT" -ne 0 ]; then
            echo "Result: FAILED (exit $PARITY_EXIT)" | tee -a freshness.log
          else
            echo "Result: OK" | tee -a freshness.log
          fi
          echo "" >> freshness.log
          echo "exit_code=$PARITY_EXIT" >> $GITHUB_OUTPUT
          exit 0

      - name: Fail on freshness/parity issues
        if: always()
        run: |
          FRESH_EXIT='${{ steps.freshness.outputs.exit_code }}'
          PARITY_EXIT='${{ steps.parity.outputs.exit_code }}'

          if [ -z "$FRESH_EXIT" ]; then FRESH_EXIT=1; fi
          if [ -z "$PARITY_EXIT" ]; then PARITY_EXIT=1; fi

          echo "Freshness exit code: $FRESH_EXIT" | tee -a freshness.log
          echo "Parity exit code: $PARITY_EXIT" | tee -a freshness.log

          if [ "$FRESH_EXIT" -ne 0 ] || [ "$PARITY_EXIT" -ne 0 ]; then
            exit 1
          fi

      - name: Create issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Data freshness lag exceeded"
          content-filepath: freshness.log
          labels: monitoring, freshness

      - name: Teams notify failure
        if: failure() && vars.ENABLE_TEAMS_NOTIFICATIONS == 'true' && env.TEAMS_WEBHOOK_URL != ''
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          python3 scripts/notify_teams.py \
            --webhook "$TEAMS_WEBHOOK_URL" \
            --title "Data Freshness FAILED" \
            --text "Dataset: ${{ env.BQ_DATASET }}\nRepo: $GITHUB_REPOSITORY\nSHA: $GITHUB_SHA\nRun: $GITHUB_RUN_ID"

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-freshness-log
          path: freshness.log
