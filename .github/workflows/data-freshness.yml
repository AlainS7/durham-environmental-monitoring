name: Data Freshness Check

on:
  schedule:
    - cron: '35 8 * * *' # After daily merge + shared refresh
  workflow_run:
    workflows: ["Daily Refresh Shared Tables (Grafana)"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write

env:
  BQ_PROJECT: ${{ vars.GCP_PROJECT_ID }}
  BQ_DATASET: sensors
  SLA_CONSECUTIVE_FAILURES: '3'

concurrency:
  group: freshness-checks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  freshness:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write GCP credentials file
        run: echo "${{ secrets.GCP_SA_KEY_JSON }}" > /tmp/gcp-key.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps minimal
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_VERIFIER_SA }}
          token_format: access_token

      - name: Run freshness check
        id: freshness
        run: |
          set +e
          EXIT=0
          : > freshness.log
          for SPEC in "sensor_readings_long:timestamp" "sensor_readings_hourly:hour_ts" "sensor_readings_daily:day_ts" "tsi_raw_materialized:ts" "wu_raw_materialized:ts"; do
            IFS=':' read -r TABLE TIME_COL <<< "$SPEC"
            echo "=== Checking ${BQ_DATASET}.${TABLE} (${TIME_COL}) ===" | tee -a freshness.log
            python scripts/check_freshness.py \
              --project "$BQ_PROJECT" \
              --dataset "$BQ_DATASET" \
              --table "$TABLE" \
              --time-column "$TIME_COL" \
              --max-lag-days 1 >> freshness.log 2>&1
            TABLE_EXIT=$?
            if [ "$TABLE_EXIT" -ne 0 ]; then
              EXIT=1
              echo "Result: FAILED (exit $TABLE_EXIT)" | tee -a freshness.log
            else
              echo "Result: OK" | tee -a freshness.log
            fi
            echo "" >> freshness.log
          done
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          cat freshness.log || true
          exit 0

      - name: Check residence freshness parity (prod vs shared)
        id: parity
        if: always()
        run: |
          set +e
          echo "=== Checking residence freshness parity (prod vs shared) ===" | tee -a freshness.log
          python scripts/check_residence_freshness_parity.py \
            --project "$BQ_PROJECT" \
            --prod-dataset sensors \
            --shared-dataset sensors_shared \
            --table residence_readings_daily \
            --max-lag-days 0 >> freshness.log 2>&1
          PARITY_EXIT=$?
          if [ "$PARITY_EXIT" -ne 0 ]; then
            echo "Result: FAILED (exit $PARITY_EXIT)" | tee -a freshness.log
          else
            echo "Result: OK" | tee -a freshness.log
          fi
          echo "" >> freshness.log
          echo "exit_code=$PARITY_EXIT" >> $GITHUB_OUTPUT
          exit 0

      - name: Fail on freshness/parity issues
        if: always()
        run: |
          FRESH_EXIT='${{ steps.freshness.outputs.exit_code }}'
          PARITY_EXIT='${{ steps.parity.outputs.exit_code }}'

          if [ -z "$FRESH_EXIT" ]; then FRESH_EXIT=1; fi
          if [ -z "$PARITY_EXIT" ]; then PARITY_EXIT=1; fi

          echo "Freshness exit code: $FRESH_EXIT" | tee -a freshness.log
          echo "Parity exit code: $PARITY_EXIT" | tee -a freshness.log

          if [ "$FRESH_EXIT" -ne 0 ] || [ "$PARITY_EXIT" -ne 0 ]; then
            exit 1
          fi

      - name: Create issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Data freshness lag exceeded"
          content-filepath: freshness.log
          labels: monitoring, freshness

      - name: Teams notify failure
        if: failure() && vars.ENABLE_TEAMS_NOTIFICATIONS == 'true' && env.TEAMS_WEBHOOK_URL != ''
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          python3 scripts/notify_teams.py \
            --webhook "$TEAMS_WEBHOOK_URL" \
            --title "Data Freshness FAILED" \
            --text "Dataset: ${{ env.BQ_DATASET }}\nRepo: $GITHUB_REPOSITORY\nSHA: $GITHUB_SHA\nRun: $GITHUB_RUN_ID"

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-freshness-log
          path: freshness.log

      - name: Evaluate consecutive failure streak
        if: failure() && github.event_name != 'workflow_dispatch'
        id: failure_streak
        uses: actions/github-script@v7
        env:
          SLA_CONSECUTIVE_FAILURES: ${{ env.SLA_CONSECUTIVE_FAILURES }}
        with:
          script: |
            const threshold = Number(process.env.SLA_CONSECUTIVE_FAILURES || '3');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';

            const resp = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              branch,
              status: 'completed',
              per_page: 100,
            });

            const workflowName = context.workflow;
            const priorRuns = resp.data.workflow_runs
              .filter(r => r.name === workflowName && r.id !== context.runId)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const failedConclusions = new Set(['failure', 'timed_out', 'cancelled']);
            let priorFailureStreak = 0;
            for (const run of priorRuns) {
              if (failedConclusions.has(run.conclusion)) {
                priorFailureStreak += 1;
                continue;
              }
              if (run.conclusion === 'success') {
                break;
              }
            }

            const currentStreak = priorFailureStreak + 1;
            const alert = currentStreak === threshold;
            core.setOutput('streak', String(currentStreak));
            core.setOutput('threshold', String(threshold));
            core.setOutput('alert', alert ? 'true' : 'false');
            core.info(`Data freshness failure streak: ${currentStreak} (threshold: ${threshold})`);

      - name: Create issue on repeated failure
        if: failure() && github.event_name != 'workflow_dispatch' && steps.failure_streak.outputs.alert == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Data freshness check failed ${process.env.STREAK} runs in a row`,
              body: [
                '## Data Freshness SLA Alert',
                '',
                `- Consecutive failures: ${process.env.STREAK}`,
                `- Threshold: ${process.env.THRESHOLD}`,
                `- Workflow run: ${process.env.RUN_URL}`,
              ].join('\n'),
              labels: ['monitoring', 'freshness', 'sla-alert']
            });
        env:
          STREAK: ${{ steps.failure_streak.outputs.streak }}
          THRESHOLD: ${{ steps.failure_streak.outputs.threshold }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
