name: Manage Resident Access / Onboarding

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "GCP project ID (optional, defaults to repo var)"
        required: false
        default: ""
      dataset_id:
        description: "BigQuery dataset"
        required: false
        default: "sensors"
      principal_email:
        description: "Resident principal email (service account/user)"
        required: true
        default: ""
      residence_id:
        description: "Residence ID to grant or revoke access for (choose CUSTOM to supply manually)"
        required: true
        type: choice
        default: "UNSET"
        options: &residence_options
          - UNSET
          - R1
          - R2
          - R3
          - R4
          - R5
          - R6
          - R7
          - R8
          - R9
          - R10
          - R11
          - R12
          - R13
          - R14
          - R15
          - R16
          - R17
          - R18
          - R19
          - R20
          - R21
          - R22
          - R23
          - R24
          - R25
          - CUSTOM
      residence_id_custom:
        description: "Custom residence ID when residence_id=CUSTOM"
        required: false
        default: ""
      active:
        description: "Set mapping active"
        required: false
        type: choice
        default: "true"
        options: &bool_options
          - "true"
          - "false"
      execute:
        description: "Apply changes (true) or dry-run (false)"
        required: false
        type: choice
        default: "true"
        options: *bool_options
      sync_grafana:
        description: "Sync updated access table to sensors_shared after successful execute"
        required: false
        type: choice
        default: "true"
        options: *bool_options

permissions:
  contents: read
  id-token: write

jobs:
  manage-access:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: |
          uv venv
          uv pip sync requirements.txt

      - name: Auth to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_VERIFIER_SA }}
          token_format: access_token

      - name: Upsert resident access
        env:
          BQ_PROJECT: ${{ github.event.inputs.project_id || vars.GCP_PROJECT_ID }}
          BQ_DATASET: ${{ github.event.inputs.dataset_id }}
        run: |
          set -euo pipefail
          resolve_choice_input() {
            local selected="$1"
            local custom="$2"
            case "$selected" in
              UNSET) printf '' ;;
              CUSTOM) printf '%s' "$custom" ;;
              *) printf '%s' "$selected" ;;
            esac
          }
          require_value() {
            local value="$1"
            local field_name="$2"
            test -n "$value" || { echo "$field_name is required"; exit 1; }
          }

          RESIDENCE_ID="$(resolve_choice_input "${{ github.event.inputs.residence_id }}" "${{ github.event.inputs.residence_id_custom }}")"
          require_value "$RESIDENCE_ID" "residence_id"

          CMD=(uv run python scripts/manage_residence_assignments.py
            --project "$BQ_PROJECT"
            --dataset "$BQ_DATASET")

          if [ "${{ github.event.inputs.execute }}" = "true" ]; then
            CMD+=(--execute)
          fi

          CMD+=(add-resident-access
            --principal-email "${{ github.event.inputs.principal_email }}"
            --residence-id "$RESIDENCE_ID"
            --active "${{ github.event.inputs.active }}")

          printf 'Command: '
          printf '%q ' "${CMD[@]}"
          echo
          "${CMD[@]}"

      - name: Sync to Grafana dataset (optional)
        if: ${{ github.event.inputs.execute == 'true' && github.event.inputs.sync_grafana == 'true' }}
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.project_id || vars.GCP_PROJECT_ID }}
        run: |
          uv run python scripts/sync_to_grafana.py
