name: Manage Residence Sensor Assignment

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Operation: add-assignment | end-assignment | switch-assignment"
        required: true
        type: choice
        options:
          - add-assignment
          - end-assignment
          - switch-assignment
      project_id:
        description: "GCP project ID (optional, defaults to repo var)"
        required: false
        default: ""
      dataset_id:
        description: "BigQuery dataset"
        required: false
        default: "sensors"
      residence_id:
        description: "Residence ID for add/end (choose CUSTOM to supply manually; UNSET leaves blank)"
        required: false
        type: choice
        default: "UNSET"
        options: &residence_options
          - UNSET
          - R1
          - R2
          - R3
          - R4
          - R5
          - R6
          - R7
          - R8
          - R9
          - R10
          - R11
          - R12
          - R13
          - R14
          - R15
          - R16
          - R17
          - R18
          - R19
          - R20
          - R21
          - R22
          - R23
          - R24
          - R25
          - CUSTOM
      residence_id_custom:
        description: "Custom residence ID when residence_id=CUSTOM"
        required: false
        default: ""
      native_sensor_id:
        description: "Native sensor ID dropdown (choose CUSTOM for manual entry)"
        required: true
        type: choice
        default: "UNSET"
        options: &native_sensor_options
          - UNSET
          # SENSOR_OPTIONS_BEGIN
          - KNCDURHA610
          - KNCDURHA617
          - KNCDURHA616
          - KNCDURHA623
          - KNCDURHA652
          - KNCDURHA649
          - KNCDURHA653
          - KNCDURHA655
          - KNCDURHA609
          - KNCDURHA656
          - KNCDURHA660
          - KNCDURHA661
          - KNCDURHA662
          - d14rfblfk2973f196c5g
          - d14rvrtfk2973f196c8g
          - d15hqklfk2973f196cag
          - d10qjt45n0vb5ljnncj0
          - d14r0a5lveq1prvgrvlg
          - d14rgsdfk2973f196c60
          - d10uesllveq1prvgrvhg
          - d10u275fk29em88uh8vg
          - d10anndfk29em88uh8v0
          - d10a64s5n0vb5ljnncig
          - d10uqedfk29em88uh90g
          - d14rlg5fk2973f196c7g
          - d10ui2dfk29em88uh900
          - d14r2q5fk2973f196c3g
          - d14rumdfk2973f196c80
          - d1ok78tlveq94soark30
          - d14rbglfk2973f196c40
          - d3ruqfpc660c73e6t89g
          - d3ruqu1c660c73e6t8a0
          - d7kj0nb8c00s73di18r0
          - d7kj16j8c00s73di18rg
          - d7kj0ovtna1s73fe1uq0
          - d14rhodfk2973f196c6g
          - d14rf6lfk2973f196c50
          - d15hov5lveq1prvgrvog
          - d14rvf5lveq1prvgrvn0
          - d147psdlveq1prvgrvkg
          - d14romdlveq1prvgrvmg
          - d14rinlfk2973f196c70
          - d14rc3dfk2973f196c4g
          - curp515veott0jmp5ajg
          - d14r5o5lveq1prvgrvm0
          - curotklveott0jmp5agg
          - curp44dveott0jmp5aig
          - curp2jdveott0jmp5ahg
          - d092rmnoovhpfm35n490
          - curp4k5veott0jmp5aj0
          - d0930cvoovhpfm35n49g
          # SENSOR_OPTIONS_END
          - CUSTOM
      native_sensor_id_custom:
        description: "Custom native sensor ID when native_sensor_id=CUSTOM"
        required: false
        default: ""
      sensor_name:
        description: "Optional sensor display name"
        required: false
        default: ""
      sensor_role:
        description: "Sensor role (required for add/switch)"
        required: false
        type: choice
        options:
          - Indoor
          - Outdoor
      start_ts:
        description: "Start timestamp for add-assignment (ISO, e.g. 2026-03-27T00:00:00Z)"
        required: false
        default: ""
      end_ts:
        description: "End timestamp for end-assignment (ISO)"
        required: false
        default: ""
      from_residence_id:
        description: "From residence for switch (choose CUSTOM to supply manually)"
        required: false
        type: choice
        default: "UNSET"
        options: *residence_options
      from_residence_id_custom:
        description: "Custom from_residence_id when from_residence_id=CUSTOM"
        required: false
        default: ""
      to_residence_id:
        description: "To residence for switch (choose CUSTOM to supply manually)"
        required: false
        type: choice
        default: "UNSET"
        options: *residence_options
      to_residence_id_custom:
        description: "Custom to_residence_id when to_residence_id=CUSTOM"
        required: false
        default: ""
      switch_ts:
        description: "Switch timestamp for switch-assignment (ISO)"
        required: false
        default: ""
      execute:
        description: "Apply changes (true) or dry-run (false)"
        required: false
        type: choice
        default: "true"
        options: &bool_options
          - "true"
          - "false"
      sync_grafana:
        description: "Sync updated tables to sensors_shared after successful execute"
        required: false
        type: choice
        default: "true"
        options: *bool_options

permissions:
  contents: read
  id-token: write

jobs:
  manage-assignment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: |
          uv venv
          uv pip sync requirements.txt

      - name: Auth to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_VERIFIER_SA }}
          token_format: access_token

      - name: Execute assignment operation
        env:
          BQ_PROJECT: ${{ github.event.inputs.project_id || vars.GCP_PROJECT_ID }}
          BQ_DATASET: ${{ github.event.inputs.dataset_id }}
        run: |
          set -euo pipefail
          resolve_choice_input() {
            local selected="$1"
            local custom="$2"
            case "$selected" in
              UNSET) printf '' ;;
              CUSTOM) printf '%s' "$(printf '%s' "$custom" | xargs)" ;;
              *) printf '%s' "$(printf '%s' "$selected" | xargs)" ;;
            esac
          }
          require_value() {
            local value="$1"
            local field_name="$2"
            test -n "$value" || { echo "$field_name is required"; exit 1; }
          }

          OP="${{ github.event.inputs.operation }}"
          EXEC_FLAG="${{ github.event.inputs.execute }}"
          CMD=(uv run python scripts/manage_residence_assignments.py --project "$BQ_PROJECT" --dataset "$BQ_DATASET")
          if [ "$EXEC_FLAG" = "true" ]; then
            CMD+=(--execute)
          fi

          NATIVE_SENSOR_ID="$(resolve_choice_input "${{ github.event.inputs.native_sensor_id }}" "${{ github.event.inputs.native_sensor_id_custom }}")"
          RESIDENCE_ID="$(resolve_choice_input "${{ github.event.inputs.residence_id }}" "${{ github.event.inputs.residence_id_custom }}")"
          FROM_RESIDENCE_ID="$(resolve_choice_input "${{ github.event.inputs.from_residence_id }}" "${{ github.event.inputs.from_residence_id_custom }}")"
          TO_RESIDENCE_ID="$(resolve_choice_input "${{ github.event.inputs.to_residence_id }}" "${{ github.event.inputs.to_residence_id_custom }}")"

          require_value "$NATIVE_SENSOR_ID" "native_sensor_id"

          case "$OP" in
            add-assignment)
              require_value "$RESIDENCE_ID" "residence_id"
              require_value "${{ github.event.inputs.sensor_role }}" "sensor_role"
              require_value "${{ github.event.inputs.start_ts }}" "start_ts"
              CMD+=(add-assignment
                --residence-id "$RESIDENCE_ID"
                --native-sensor-id "$NATIVE_SENSOR_ID"
                --sensor-role "${{ github.event.inputs.sensor_role }}"
                --start-ts "${{ github.event.inputs.start_ts }}")
              if [ -n "${{ github.event.inputs.sensor_name }}" ]; then
                CMD+=(--sensor-name "${{ github.event.inputs.sensor_name }}")
              fi
              ;;
            end-assignment)
              require_value "${{ github.event.inputs.end_ts }}" "end_ts"
              CMD+=(end-assignment
                --native-sensor-id "$NATIVE_SENSOR_ID"
                --end-ts "${{ github.event.inputs.end_ts }}")
              if [ -n "$RESIDENCE_ID" ]; then
                CMD+=(--residence-id "$RESIDENCE_ID")
              fi
              ;;
            switch-assignment)
              require_value "$FROM_RESIDENCE_ID" "from_residence_id"
              require_value "$TO_RESIDENCE_ID" "to_residence_id"
              require_value "${{ github.event.inputs.sensor_role }}" "sensor_role"
              require_value "${{ github.event.inputs.switch_ts }}" "switch_ts"
              CMD+=(switch-assignment
                --native-sensor-id "$NATIVE_SENSOR_ID"
                --from-residence-id "$FROM_RESIDENCE_ID"
                --to-residence-id "$TO_RESIDENCE_ID"
                --sensor-role "${{ github.event.inputs.sensor_role }}"
                --switch-ts "${{ github.event.inputs.switch_ts }}")
              if [ -n "${{ github.event.inputs.sensor_name }}" ]; then
                CMD+=(--sensor-name "${{ github.event.inputs.sensor_name }}")
              fi
              ;;
            *)
              echo "Unsupported operation: $OP"
              exit 1
              ;;
          esac

          echo "Running operation: $OP"
          printf 'Command: '
          printf '%q ' "${CMD[@]}"
          echo
          "${CMD[@]}"

      - name: Sync to Grafana dataset (optional)
        if: ${{ github.event.inputs.execute == 'true' && github.event.inputs.sync_grafana == 'true' }}
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.project_id || vars.GCP_PROJECT_ID }}
        run: |
          uv run python scripts/sync_to_grafana.py
