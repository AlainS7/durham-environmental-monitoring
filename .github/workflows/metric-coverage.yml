name: Metric Coverage Check

on:
  schedule:
    - cron: '5 8 * * *' # after daily ingest + merge + transformations
  workflow_run:
    workflows: ["Execute Transformations"]
    types:
      - completed
  workflow_dispatch:

env:
  BQ_PROJECT: ${{ vars.GCP_PROJECT_ID }}
  BQ_DATASET: sensors
  SLA_CONSECUTIVE_FAILURES: '3'

concurrency:
  group: metric-coverage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  coverage:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_VERIFIER_SA }}
          token_format: access_token
      - name: Run coverage check (yesterday)
        run: |
          YESTERDAY=$(date -u -d 'yesterday' +%F)
          python scripts/check_metric_coverage.py \
            --project ${{ env.BQ_PROJECT }} \
            --dataset ${{ env.BQ_DATASET }} \
            --date $YESTERDAY \
            --manifest config/metrics_manifest.json \
            --threshold 0.9

      - name: Evaluate consecutive failure streak
        if: failure() && github.event_name != 'workflow_dispatch'
        id: failure_streak
        uses: actions/github-script@v7
        env:
          SLA_CONSECUTIVE_FAILURES: ${{ env.SLA_CONSECUTIVE_FAILURES }}
        with:
          script: |
            const threshold = Number(process.env.SLA_CONSECUTIVE_FAILURES || '3');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';

            const resp = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              branch,
              status: 'completed',
              per_page: 100,
            });

            const workflowName = context.workflow;
            const priorRuns = resp.data.workflow_runs
              .filter(r => r.name === workflowName && r.id !== context.runId)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const failedConclusions = new Set(['failure', 'timed_out', 'cancelled']);
            let priorFailureStreak = 0;
            for (const run of priorRuns) {
              if (failedConclusions.has(run.conclusion)) {
                priorFailureStreak += 1;
                continue;
              }
              if (run.conclusion === 'success') {
                break;
              }
            }

            const currentStreak = priorFailureStreak + 1;
            const alert = currentStreak === threshold;
            core.setOutput('streak', String(currentStreak));
            core.setOutput('threshold', String(threshold));
            core.setOutput('alert', alert ? 'true' : 'false');
            core.info(`Metric coverage failure streak: ${currentStreak} (threshold: ${threshold})`);

      - name: Create issue on repeated failure
        if: failure() && github.event_name != 'workflow_dispatch' && steps.failure_streak.outputs.alert == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Metric coverage failed ${process.env.STREAK} runs in a row`,
              body: [
                '## Metric Coverage SLA Alert',
                '',
                `- Consecutive failures: ${process.env.STREAK}`,
                `- Threshold: ${process.env.THRESHOLD}`,
                `- Workflow run: ${process.env.RUN_URL}`,
              ].join('\n'),
              labels: ['monitoring', 'coverage', 'sla-alert']
            });
        env:
          STREAK: ${{ steps.failure_streak.outputs.streak }}
          THRESHOLD: ${{ steps.failure_streak.outputs.threshold }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
